<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barrierefreie Navigations-App</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Leaflet CSS und JS ohne integrity und crossorigin -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1>Barrierefreie Navigation</h1>
  </header>
  
  <section id="controls">
    <label><input type="checkbox" id="ramps" checked> Nur Rampen</label>
    <label><input type="checkbox" id="avoid-stairs"> Treppen vermeiden</label>
  </section>

  <section id="map-container">
    <div id="map"></div>
  </section>

  <section id="info">
    <p>Aktuelle Geschwindigkeit: <span id="speed">0</span> km/h</p>
    <p>Zurückgelegte Distanz: <span id="distance">0</span> m</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
